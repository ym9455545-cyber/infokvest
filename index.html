<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infokvest</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --accent:#38bdf8;
    --success:#22c55e;
    --text:#f8fafc;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:var(--text);
    min-height:100vh;
    padding:20px;
}

header{
    text-align:center;
    margin-bottom:30px;
}

h1{
    color:var(--accent);
    font-size:3rem;
}

.stats{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:15px;
    flex-wrap:wrap;
}

.stat{
    background:var(--card);
    padding:15px 25px;
    border-radius:15px;
}

.progress-bar{
    width:300px;
    height:18px;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
    margin:15px auto;
}

.progress{
    height:100%;
    width:0%;
    background:var(--accent);
    transition:.4s;
}

.container{
    max-width:900px;
    margin:auto;
}

.quest{
    background:var(--card);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.quest.locked{
    opacity:.4;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
}

button{
    margin-top:10px;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:var(--accent);
    color:white;
    font-weight:bold;
}

.success{
    color:var(--success);
    margin-top:10px;
}
</style>
</head>

<body>

<header>
    <h1>🖥️ INFOKVEST</h1>

    <div class="stats">
        <div class="stat">Уровень: <span id="level">1</span></div>
        <div class="stat">XP: <span id="xp">0</span></div>
    </div>

    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
</header>

<div class="container">

<div class="quest" id="q1">
    <h2>Уровень 1</h2>
    <p>Переведи число 13 в двоичную систему.</p>
    <input id="a1" placeholder="Ответ">
    <button onclick="check(1,'1101',20)">Проверить</button>
    <div id="r1"></div>
</div>

<div class="quest locked" id="q2">
    <h2>Уровень 2</h2>
    <p>Сколько бит в одном байте?</p>
    <input id="a2" placeholder="Ответ">
    <button onclick="check(2,'8',20)">Проверить</button>
    <div id="r2"></div>
</div>

<div class="quest locked" id="q3">
    <h2>Уровень 3</h2>
    <p>Какой HTML-тег создаёт ссылку?</p>
    <input id="a3" placeholder="Ответ">
    <button onclick="check(3,'a',30)">Проверить</button>
    <div id="r3"></div>
</div>

<div class="quest locked" id="q4">
    <h2>Уровень 4</h2>
    <p>Чему равно: (1 AND 0) OR 1</p>
    <input id="a4" placeholder="Ответ">
    <button onclick="check(4,'1',30)">Проверить</button>
    <div id="r4"></div>
</div>

<div class="quest locked" id="q5">
    <h2>Финальный уровень</h2>
    <p>Как называется язык разметки веб-страниц?</p>
    <input id="a5" placeholder="Ответ">
    <button onclick="check(5,'html',50)">Проверить</button>
    <div id="r5"></div>
</div>

</div>

<script>
let xp = Number(localStorage.getItem("infokvestXP")) || 0;
let level = Number(localStorage.getItem("infokvestLevel")) || 1;

updateUI();

function updateUI(){
    document.getElementById("xp").textContent = xp;
    document.getElementById("level").textContent = level;

    let percent = Math.min((xp / 150) * 100,100);
    document.getElementById("progress").style.width = percent+"%";

    for(let i=2;i<=5;i++){
        if(level >= i){
            document.getElementById("q"+i).classList.remove("locked");
        }
    }
}

function check(num, answer, reward){

    let value = document.getElementById("a"+num)
    .value
    .trim()
    .toLowerCase()
    .replace(/[<>]/g,'');

    if(value === answer){

        document.getElementById("r"+num)
        .innerHTML = "<div class='success'>✅ Верно!</div>";

        if(level === num){
            xp += reward;
            level++;

            localStorage.setItem("infokvestXP",xp);
            localStorage.setItem("infokvestLevel",level);

            updateUI();
        }

    } else {
        document.getElementById("r"+num)
        .innerHTML = "❌ Попробуй ещё";
    }
}
</script>

</body>
</html>
